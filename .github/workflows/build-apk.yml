name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master, work ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Check for stale Media3 imports
        run: |
          if find app/src/main/java -type f -name '*.java' -print0 | xargs -0 grep -n "androidx.media3"; then
            echo "Found stale Media3 imports. Push the latest self-contained VideoView code before building." >&2
            exit 1
          fi

      - name: Show Gradle version
        run: gradle --version

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tv-caster-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
